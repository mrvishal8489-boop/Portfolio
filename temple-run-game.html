<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Rush - Endless Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
  }

  #gameContainer {
    position: relative;
    width: 480px;
    height: 700px;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 0 80px rgba(255, 140, 0, 0.4), 0 0 160px rgba(255, 80, 0, 0.2);
    border: 2px solid rgba(255, 140, 0, 0.3);
  }

  canvas {
    display: block;
    border-radius: 20px;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .score-panel {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,140,0,0.4);
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
  }

  .score-label {
    font-size: 9px;
    color: rgba(255,200,100,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 22px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.8);
  }

  .lives-panel {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,140,0,0.4);
    border-radius: 12px;
    align-items: center;
  }

  .heart {
    font-size: 18px;
    filter: drop-shadow(0 0 6px #ff4444);
    transition: transform 0.3s;
  }

  .heart.lost { filter: grayscale(1) opacity(0.3); transform: scale(0.8); }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    border-radius: 20px;
    background: radial-gradient(ellipse at center, rgba(10,5,0,0.85) 0%, rgba(0,0,0,0.95) 100%);
    backdrop-filter: blur(4px);
  }

  #overlay.hidden { display: none; }

  .temple-icon {
    font-size: 80px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,140,0,0.8));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-15px) rotate(2deg); }
  }

  .game-title {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #ff8c00, #ffd700, #ff4500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255,140,0,0.6));
    margin-bottom: 4px;
    letter-spacing: 3px;
  }

  .game-subtitle {
    color: rgba(255,200,100,0.6);
    font-size: 11px;
    letter-spacing: 6px;
    margin-bottom: 30px;
  }

  .best-score-display {
    color: rgba(255,215,0,0.8);
    font-size: 13px;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }

  .btn {
    background: linear-gradient(135deg, #ff6a00, #ee0979, #ff6a00);
    background-size: 200% 200%;
    animation: gradientShift 3s ease infinite;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 0 30px rgba(255,100,0,0.5), 0 0 60px rgba(255,100,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
    pointer-events: all;
  }

  .btn:hover {
    transform: scale(1.08) translateY(-3px);
    box-shadow: 0 0 50px rgba(255,100,0,0.8), 0 0 100px rgba(255,100,0,0.3);
  }

  .btn:active { transform: scale(0.96); }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .controls-hint {
    margin-top: 30px;
    display: flex;
    gap: 16px;
    pointer-events: none;
  }

  .control-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: rgba(255,200,100,0.6);
    font-size: 9px;
    letter-spacing: 1px;
  }

  .key {
    background: rgba(255,140,0,0.15);
    border: 1px solid rgba(255,140,0,0.4);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
  }

  .game-over-text {
    font-family: 'Cinzel', serif;
    font-size: 36px;
    font-weight: 900;
    color: #ff4444;
    text-shadow: 0 0 30px rgba(255,68,68,0.8);
    margin-bottom: 10px;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .final-score {
    color: #ffd700;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
  }

  .final-best {
    color: rgba(255,200,100,0.6);
    font-size: 12px;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }

  #speedIndicator {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 10;
  }

  .speed-bar-bg {
    width: 120px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
    border: 1px solid rgba(255,140,0,0.3);
  }

  #speedBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6a00, #ffd700);
    border-radius: 3px;
    transition: width 0.3s;
    box-shadow: 0 0 10px rgba(255,140,0,0.8);
  }

  .speed-label {
    color: rgba(255,200,100,0.6);
    font-size: 8px;
    letter-spacing: 2px;
    text-align: center;
  }

  #coinCounter {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 20px;
    padding: 4px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #ffd700;
    font-size: 14px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="480" height="700"></canvas>

  <div id="ui">
    <div class="score-panel">
      <div class="score-label">Score</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="lives-panel">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
    </div>
  </div>

  <div id="coinCounter">🪙 <span id="coinDisplay">0</span></div>

  <div id="speedIndicator">
    <div class="speed-label">SPEED</div>
    <div class="speed-bar-bg"><div id="speedBar"></div></div>
  </div>

  <!-- Start Screen -->
  <div id="overlay">
    <div class="temple-icon">🏛️</div>
    <div class="game-title">TEMPLE RUSH</div>
    <div class="game-subtitle">ENDLESS RUNNER</div>
    <div class="best-score-display" id="bestScoreDisplay">BEST: 0</div>
    <button class="btn" id="startBtn" onclick="startGame()">▶ RUN!</button>
    <div class="controls-hint">
      <div class="control-item"><span class="key">←</span>MOVE LEFT</div>
      <div class="control-item"><span class="key">↑</span>JUMP</div>
      <div class="control-item"><span class="key">↓</span>SLIDE</div>
      <div class="control-item"><span class="key">→</span>MOVE RIGHT</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game State
let gameState = 'menu'; // menu, playing, gameover
let score = 0, coins = 0, bestScore = 0;
let lives = 3;
let speed = 4;
let frame = 0;
let animFrame;
let invincible = false, invincibleTimer = 0;
let lastLaneChange = 0;

// Track
const LANES = [120, 240, 360];
const TILE_H = 80;
let tileOffset = 0;

// Player
const player = {
  lane: 1, // 0=left,1=mid,2=right
  x: LANES[1],
  y: 480,
  w: 36, h: 52,
  jumping: false,
  sliding: false,
  jumpV: 0,
  jumpY: 480,
  targetX: LANES[1],
  runFrame: 0,
  runTimer: 0,
  dead: false,
  shieldActive: false,
  shieldTimer: 0,
};

// Objects
let obstacles = [];
let coinItems = [];
let particles = [];
let bgParticles = [];
let powerups = [];

// Input
const keys = {};
let touchStartX = 0, touchStartY = 0;

// Colors & Theme
const TRACK_COLOR = '#2a1a08';
const TRACK_EDGE = '#8B4513';
const TRACK_LINE = '#4a2a10';
const TILE_COLORS = ['#3d2010', '#331a0a', '#3a1e0d'];

// --- INIT BG PARTICLES ---
function initBgParticles() {
  bgParticles = [];
  for (let i = 0; i < 60; i++) {
    bgParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.5 + 0.1,
      speed: Math.random() * 0.3 + 0.1,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}

// --- SPAWN OBSTACLE ---
function spawnObstacle() {
  const types = ['barrier', 'low', 'gap', 'fire'];
  const weights = [40, 30, 20, 10];
  let rand = Math.random() * 100;
  let type = 'barrier';
  let acc = 0;
  for (let i = 0; i < types.length; i++) {
    acc += weights[i];
    if (rand < acc) { type = types[i]; break; }
  }

  if (type === 'gap') {
    // Multiple lane obstacles
    const blockedLane = Math.floor(Math.random() * 3);
    for (let l = 0; l < 3; l++) {
      if (l !== blockedLane) {
        obstacles.push({ lane: l, y: -120, type: 'barrier', w: 44, h: 44, hit: false });
      }
    }
  } else {
    const lane = Math.floor(Math.random() * 3);
    obstacles.push({ lane, y: -80, type, w: type==='low'?48:40, h: type==='low'?28:44, hit: false });
  }
}

// --- SPAWN COIN ---
function spawnCoin() {
  const lane = Math.floor(Math.random() * 3);
  const count = Math.floor(Math.random() * 4) + 2;
  for (let i = 0; i < count; i++) {
    coinItems.push({ lane, y: -60 - i * 55, collected: false, bobOffset: Math.random() * Math.PI * 2 });
  }
}

// --- SPAWN POWERUP ---
function spawnPowerup() {
  if (Math.random() < 0.3) {
    const lane = Math.floor(Math.random() * 3);
    powerups.push({ lane, y: -80, type: 'shield', collected: false });
  }
}

// --- PARTICLE BURST ---
function burst(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const spd = Math.random() * 4 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: Math.random() * 5 + 2,
      alpha: 1,
      color,
      life: 1,
    });
  }
}

// --- DRAW BACKGROUND ---
function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.5);
  sky.addColorStop(0, '#0a0005');
  sky.addColorStop(0.4, '#1a0a20');
  sky.addColorStop(1, '#2d1500');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Moon
  const moonGlow = ctx.createRadialGradient(380, 80, 5, 380, 80, 60);
  moonGlow.addColorStop(0, 'rgba(255,220,100,0.3)');
  moonGlow.addColorStop(1, 'rgba(255,220,100,0)');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(320, 20, 120, 120);

  ctx.beginPath();
  ctx.arc(380, 80, 28, 0, Math.PI*2);
  ctx.fillStyle = '#ffe87a';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 30;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Stars
  bgParticles.forEach(p => {
    p.twinkle += 0.03;
    const a = p.alpha + Math.sin(p.twinkle) * 0.2;
    ctx.beginPath();
    ctx.arc(p.x, p.y * 0.5, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,200,${a})`;
    ctx.fill();
  });

  // Distant temple silhouette
  drawTempleBackground();

  // Trees / jungle sides
  drawJungleSides();
}

function drawTempleBackground() {
  ctx.fillStyle = 'rgba(20,8,2,0.9)';
  // Main temple body
  ctx.fillRect(160, 220, 160, 180);
  // Steps
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(160 - i*14, 220 + i*12, 160 + i*28, 12);
  }
  // Pillars
  ctx.fillStyle = 'rgba(30,12,3,0.9)';
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(165 + i*52, 230, 16, 100);
  }
  // Spire
  ctx.fillStyle = 'rgba(25,10,2,0.9)';
  ctx.beginPath();
  ctx.moveTo(240, 120);
  ctx.lineTo(210, 220);
  ctx.lineTo(270, 220);
  ctx.closePath();
  ctx.fill();

  // Glow from temple
  const templeGlow = ctx.createRadialGradient(240, 200, 0, 240, 200, 120);
  templeGlow.addColorStop(0, 'rgba(255,100,0,0.08)');
  templeGlow.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = templeGlow;
  ctx.fillRect(120, 140, 240, 240);

  // Torches on temple
  const torchFlicker = Math.sin(frame * 0.2) * 0.3 + 0.7;
  [185, 295].forEach(tx => {
    ctx.fillStyle = `rgba(255,${Math.floor(100*torchFlicker)},0,0.9)`;
    ctx.beginPath();
    ctx.arc(tx, 225, 5, 0, Math.PI * 2);
    ctx.fill();
    const tg = ctx.createRadialGradient(tx, 225, 0, tx, 225, 20);
    tg.addColorStop(0, `rgba(255,150,0,${0.3*torchFlicker})`);
    tg.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = tg;
    ctx.beginPath();
    ctx.arc(tx, 225, 20, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawJungleSides() {
  // Left jungle
  for (let i = 0; i < 5; i++) {
    const x = -20 + i * 18;
    const h = 180 + Math.sin(i * 1.3 + frame * 0.02) * 20;
    const y = H * 0.3 + i * 10;
    ctx.fillStyle = `rgba(${10+i*5},${25+i*8},${5+i*3},0.8)`;
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    ctx.lineTo(x + 30, y);
    ctx.lineTo(x + 60, y + h);
    ctx.closePath();
    ctx.fill();
  }
  // Right jungle
  for (let i = 0; i < 5; i++) {
    const x = W - 20 - i * 18;
    const h = 180 + Math.sin(i * 1.7 + frame * 0.02 + 1) * 20;
    const y = H * 0.3 + i * 10;
    ctx.fillStyle = `rgba(${10+i*5},${25+i*8},${5+i*3},0.8)`;
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    ctx.lineTo(x - 30, y);
    ctx.lineTo(x - 60, y + h);
    ctx.closePath();
    ctx.fill();
  }
}

// --- DRAW TRACK ---
function drawTrack() {
  // Track surface
  const trackGrad = ctx.createLinearGradient(60, H * 0.45, 420, H);
  trackGrad.addColorStop(0, '#3d2010');
  trackGrad.addColorStop(1, '#1a0a04');
  ctx.fillStyle = trackGrad;

  ctx.beginPath();
  ctx.moveTo(80, H * 0.45);
  ctx.lineTo(400, H * 0.45);
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Track tiles
  const tileCount = Math.ceil(H / TILE_H) + 2;
  for (let i = 0; i < tileCount; i++) {
    const ty = (i * TILE_H - tileOffset % TILE_H);
    const progress = ty / H;
    const lx = 80 + progress * (-80);
    const rx = 400 + progress * (80);
    const lineY = ty + H * 0.45;

    if (lineY > H * 0.45 && lineY < H) {
      ctx.strokeStyle = `rgba(70,35,15,${0.4 + progress * 0.3})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lx, lineY);
      ctx.lineTo(rx, lineY);
      ctx.stroke();
    }
  }

  // Lane dividers
  [0, 1, 2].forEach((_, li) => {
    const lx = 80, rx = 400;
    const divX = lx + (rx - lx) * (li / 3 + 1/6);
    ctx.strokeStyle = 'rgba(100,50,20,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(divX, H * 0.45);
    ctx.lineTo(divX < 240 ? divX - 50 : divX + 50, H);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Track edges glow
  ctx.strokeStyle = 'rgba(255,100,0,0.3)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(80, H * 0.45);
  ctx.lineTo(0, H);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(400, H * 0.45);
  ctx.lineTo(W, H);
  ctx.stroke();

  // Edge glow effect
  const leftGlow = ctx.createLinearGradient(0, 0, 80, 0);
  leftGlow.addColorStop(0, 'rgba(0,0,0,0)');
  leftGlow.addColorStop(1, 'rgba(255,80,0,0.05)');
  ctx.fillStyle = leftGlow;
  ctx.fillRect(0, H * 0.45, 80, H);

  const rightGlow = ctx.createLinearGradient(400, 0, W, 0);
  rightGlow.addColorStop(0, 'rgba(255,80,0,0.05)');
  rightGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rightGlow;
  ctx.fillRect(400, H * 0.45, 80, H);
}

// --- WORLD TO SCREEN ---
function worldToScreen(lane, worldY) {
  const laneX = LANES[lane];
  const perspective = (worldY + 500) / 500;
  const screenX = 240 + (laneX - 240) / perspective;
  const screenY = H * 0.45 + (600 - worldY) / 600 * (H - H * 0.45) * perspective;
  const scale = 1 / perspective;
  return { x: screenX, y: screenY, scale };
}

// --- GET OBJECT SCREEN POS ---
function getScreenPos(obj) {
  const laneX = LANES[obj.lane];
  const depth = (obj.y + 600) / 600;
  const sx = 240 + (laneX - 240) * depth;
  const sy = H * 0.45 + (1 - (obj.y + 600) / 1200) * (H - H * 0.45);
  const scale = Math.max(0.1, depth * 0.8);
  return { sx, sy, scale };
}

// --- DRAW PLAYER ---
function drawPlayer() {
  const px = player.x;
  let py = player.y;
  if (player.jumping) py = player.jumpY;

  const alpha = invincible ? (Math.sin(frame * 0.4) > 0 ? 0.4 : 1) : 1;
  ctx.globalAlpha = alpha;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(px, player.y + 26, 18, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shield effect
  if (player.shieldActive) {
    const sg = ctx.createRadialGradient(px, py, 10, px, py, 40);
    sg.addColorStop(0, 'rgba(0,200,255,0.1)');
    sg.addColorStop(1, 'rgba(0,200,255,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(px, py, 40, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = `rgba(0,200,255,${0.4 + Math.sin(frame * 0.1) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, 34, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Run animation
  player.runTimer++;
  if (player.runTimer > 8) { player.runTimer = 0; player.runFrame = (player.runFrame + 1) % 4; }
  const legSwing = Math.sin(player.runFrame * Math.PI / 2) * 10;

  if (player.sliding) {
    // Sliding pose
    // Body
    ctx.fillStyle = '#e8a050';
    ctx.beginPath();
    ctx.ellipse(px, py + 20, 18, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#c87830';
    ctx.beginPath();
    ctx.arc(px + 14, py + 14, 10, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Body
    const bodyGrad = ctx.createLinearGradient(px - 14, py, px + 14, py);
    bodyGrad.addColorStop(0, '#d4622a');
    bodyGrad.addColorStop(0.5, '#e8803c');
    bodyGrad.addColorStop(1, '#c4521a');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.roundRect(px - 12, py - 10, 24, 38, 6);
    ctx.fill();

    // Belt
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(px - 12, py + 14, 24, 5);

    // Head
    ctx.fillStyle = '#d4956a';
    ctx.beginPath();
    ctx.arc(px, py - 18, 13, 0, Math.PI * 2);
    ctx.fill();
    // Hair
    ctx.fillStyle = '#3d1a00';
    ctx.beginPath();
    ctx.arc(px, py - 26, 11, Math.PI, 0);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(px - 7, py - 22, 5, 5);
    ctx.fillRect(px + 2, py - 22, 5, 5);
    ctx.fillStyle = '#333';
    ctx.fillRect(px - 6, py - 21, 3, 3);
    ctx.fillRect(px + 3, py - 21, 3, 3);

    // Arms
    ctx.strokeStyle = '#c87030';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    const armSwing = Math.sin(player.runFrame * Math.PI / 2) * 15;
    ctx.beginPath();
    ctx.moveTo(px - 12, py);
    ctx.lineTo(px - 22, py + armSwing + 14);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 12, py);
    ctx.lineTo(px + 22, py - armSwing + 14);
    ctx.stroke();

    // Legs
    ctx.strokeStyle = '#6B3010';
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(px - 6, py + 28);
    ctx.lineTo(px - 8, py + 48 + legSwing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 6, py + 28);
    ctx.lineTo(px + 8, py + 48 - legSwing);
    ctx.stroke();

    // Shoes
    ctx.fillStyle = '#3d1a00';
    ctx.beginPath();
    ctx.ellipse(px - 9, py + 50 + legSwing, 8, 5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px + 9, py + 50 - legSwing, 8, 5, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
}

// --- DRAW OBSTACLE ---
function drawObstacle(obs) {
  if (obs.hit) return;
  const { sx, sy, scale } = getScreenPos(obs);
  if (sy > H || sy < H * 0.4) return;

  const w = obs.w * scale * 1.5;
  const h = obs.h * scale * 1.5;

  ctx.save();
  ctx.translate(sx, sy);

  if (obs.type === 'barrier') {
    // Stone barrier
    const g = ctx.createLinearGradient(-w/2, -h, w/2, 0);
    g.addColorStop(0, '#8B6914');
    g.addColorStop(0.5, '#A0782A');
    g.addColorStop(1, '#6B4914');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(-w/2, -h, w, h, 4 * scale);
    ctx.fill();
    ctx.strokeStyle = '#c4922a';
    ctx.lineWidth = 1.5 * scale;
    ctx.stroke();

    // Stone texture lines
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = scale;
    ctx.beginPath();
    ctx.moveTo(-w/2, -h * 0.5);
    ctx.lineTo(w/2, -h * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -h);
    ctx.lineTo(0, 0);
    ctx.stroke();

    // Warning markings
    ctx.strokeStyle = `rgba(255,80,0,${0.5 + Math.sin(frame * 0.15) * 0.3})`;
    ctx.lineWidth = 2 * scale;
    ctx.beginPath();
    ctx.moveTo(-w/2 + 4*scale, -h + 4*scale);
    ctx.lineTo(w/2 - 4*scale, -4*scale);
    ctx.stroke();

  } else if (obs.type === 'low') {
    // Low obstacle (duck under)
    const g = ctx.createLinearGradient(-w/2, -h, w/2, 0);
    g.addColorStop(0, '#4a6a00');
    g.addColorStop(1, '#2a4a00');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(-w/2, -h, w, h, 5 * scale);
    ctx.fill();
    ctx.strokeStyle = '#6a9a10';
    ctx.lineWidth = 1.5 * scale;
    ctx.stroke();
    // Arrow indicator
    ctx.fillStyle = `rgba(200,255,0,${0.6 + Math.sin(frame * 0.2) * 0.3})`;
    ctx.font = `${14*scale}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('↓', 0, -h/2 + 5*scale);

  } else if (obs.type === 'fire') {
    // Fire pillar
    const fireH = h * 1.5;
    for (let fi = 0; fi < 5; fi++) {
      const flicker = Math.sin(frame * 0.3 + fi * 1.2) * 8 * scale;
      const fg = ctx.createRadialGradient(fi * w/5 - w/2 + w/10, -fireH/2, 0, fi * w/5 - w/2 + w/10, -fireH/2, fireH/2 + flicker);
      fg.addColorStop(0, 'rgba(255,255,100,0.9)');
      fg.addColorStop(0.3, 'rgba(255,150,0,0.7)');
      fg.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.ellipse(fi * w/5 - w/2 + w/10, -fireH/2 + flicker/2, w/8, fireH/2 + Math.abs(flicker), 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Base
    ctx.fillStyle = '#333';
    ctx.fillRect(-w/2, -h*0.2, w, h*0.2);
  }

  ctx.restore();
}

// --- DRAW COIN ---
function drawCoin(coin) {
  if (coin.collected) return;
  const { sx, sy, scale } = getScreenPos(coin);
  if (sy > H || sy < H * 0.4) return;

  coin.bobOffset += 0.05;
  const bob = Math.sin(coin.bobOffset) * 3;

  ctx.save();
  ctx.translate(sx, sy + bob);

  const r = 10 * scale;
  const cg = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
  cg.addColorStop(0, '#fff7a0');
  cg.addColorStop(0.3, '#ffd700');
  cg.addColorStop(1, '#b8860b');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#daa520';
  ctx.lineWidth = 1 * scale;
  ctx.stroke();

  // Coin shine
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-r*0.3, -r*0.3, r*0.3, r*0.2, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // Glow
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2);
  glow.addColorStop(0, 'rgba(255,215,0,0.3)');
  glow.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, r * 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// --- DRAW POWERUP ---
function drawPowerup(pu) {
  if (pu.collected) return;
  const { sx, sy, scale } = getScreenPos(pu);
  if (sy > H || sy < H * 0.4) return;

  ctx.save();
  ctx.translate(sx, sy);

  const t = frame * 0.05;
  ctx.rotate(t);

  const r = 14 * scale;
  ctx.fillStyle = `rgba(0,200,255,${0.7 + Math.sin(frame*0.1)*0.2})`;
  ctx.beginPath();
  // Star shape
  for (let i = 0; i < 6; i++) {
    const a = (i * Math.PI * 2 / 6) - Math.PI/2;
    const a2 = a + Math.PI / 6;
    const or = r, ir = r * 0.5;
    if (i === 0) ctx.moveTo(Math.cos(a) * or, Math.sin(a) * or);
    else ctx.lineTo(Math.cos(a) * or, Math.sin(a) * or);
    ctx.lineTo(Math.cos(a2) * ir, Math.sin(a2) * ir);
  }
  ctx.closePath();
  ctx.fill();

  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2.5);
  glow.addColorStop(0, 'rgba(0,200,255,0.4)');
  glow.addColorStop(1, 'rgba(0,200,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, r * 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// --- DRAW PARTICLES ---
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// --- SCORE POPUP ---
let scorePopups = [];
function addScorePopup(x, y, text, color = '#ffd700') {
  scorePopups.push({ x, y, text, color, life: 1, vy: -2 });
}

function drawScorePopups() {
  scorePopups.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 20px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// --- UPDATE PARTICLES ---
function updateParticles() {
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.alpha -= 0.025;
    p.life = p.alpha;
  });

  scorePopups = scorePopups.filter(p => p.life > 0);
  scorePopups.forEach(p => {
    p.y += p.vy;
    p.life -= 0.02;
  });
}

// --- COLLISION CHECK ---
function checkCollision(obj, pw, ph, isSliding, isJumping, jumpY) {
  const { sx, sy, scale } = getScreenPos(obj);
  const ow = obj.w * scale * 1.5;
  const oh = obj.h * scale * 1.5;

  const playerX = player.x;
  const playerY = isJumping ? jumpY : player.y;
  const pHeight = isSliding ? ph * 0.5 : ph;
  const pTop = isSliding ? playerY + ph * 0.5 : playerY - ph * 0.5;

  const hitsX = Math.abs(playerX - sx) < (pw * 0.5 + ow * 0.5) * 0.7;

  if (obj.type === 'low') {
    if (hitsX && !isSliding && !isJumping) {
      const hitsY = playerY - ph * 0.5 < sy && playerY + ph * 0.5 > sy - oh;
      return hitsY;
    }
    return false;
  }

  const hitsY = playerY + pHeight * 0.5 > sy - oh && pTop < sy;
  return hitsX && hitsY;
}

// --- INPUT ---
document.addEventListener('keydown', e => {
  if (gameState !== 'playing') return;
  const now = Date.now();
  if (e.key === 'ArrowLeft' && player.lane > 0 && now - lastLaneChange > 200) {
    player.lane--;
    player.targetX = LANES[player.lane];
    lastLaneChange = now;
    burst(player.x, player.y, '#ff8c00', 6);
  }
  if (e.key === 'ArrowRight' && player.lane < 2 && now - lastLaneChange > 200) {
    player.lane++;
    player.targetX = LANES[player.lane];
    lastLaneChange = now;
    burst(player.x, player.y, '#ff8c00', 6);
  }
  if ((e.key === 'ArrowUp' || e.key === ' ') && !player.jumping) {
    player.jumping = true;
    player.jumpV = -14;
    player.jumpY = player.y;
  }
  if (e.key === 'ArrowDown') {
    player.sliding = true;
    setTimeout(() => { player.sliding = false; }, 600);
  }
});

// Touch controls
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (gameState !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const now = Date.now();

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx < -30 && player.lane > 0 && now - lastLaneChange > 200) {
      player.lane--;
      player.targetX = LANES[player.lane];
      lastLaneChange = now;
    } else if (dx > 30 && player.lane < 2 && now - lastLaneChange > 200) {
      player.lane++;
      player.targetX = LANES[player.lane];
      lastLaneChange = now;
    }
  } else {
    if (dy < -30 && !player.jumping) {
      player.jumping = true;
      player.jumpV = -14;
      player.jumpY = player.y;
    } else if (dy > 30) {
      player.sliding = true;
      setTimeout(() => { player.sliding = false; }, 600);
    }
  }
  e.preventDefault();
}, { passive: false });

// --- UPDATE GAME ---
let obstacleTimer = 0, coinTimer = 0, powerupTimer = 0;

function update() {
  frame++;
  tileOffset += speed;

  // Speed up over time
  speed = Math.min(12, 4 + score / 800);
  document.getElementById('speedBar').style.width = `${((speed - 4) / 8) * 100}%`;

  // Smooth player X movement
  player.x += (player.targetX - player.x) * 0.18;

  // Jump physics
  if (player.jumping) {
    player.jumpV += 0.7;
    player.jumpY += player.jumpV;
    if (player.jumpY >= player.y) {
      player.jumpY = player.y;
      player.jumping = false;
      player.jumpV = 0;
    }
  }

  // Score
  score += speed * 0.05;
  document.getElementById('scoreDisplay').textContent = Math.floor(score);

  // Invincible timer
  if (invincible) {
    invincibleTimer--;
    if (invincibleTimer <= 0) { invincible = false; }
  }

  // Shield timer
  if (player.shieldActive) {
    player.shieldTimer--;
    if (player.shieldTimer <= 0) { player.shieldActive = false; }
  }

  // Spawn obstacles
  obstacleTimer++;
  const spawnInterval = Math.max(50, 120 - score / 30);
  if (obstacleTimer > spawnInterval) {
    obstacleTimer = 0;
    spawnObstacle();
  }

  // Spawn coins
  coinTimer++;
  if (coinTimer > 80) {
    coinTimer = 0;
    spawnCoin();
  }

  // Spawn powerups
  powerupTimer++;
  if (powerupTimer > 400) {
    powerupTimer = 0;
    spawnPowerup();
  }

  // Move obstacles
  obstacles.forEach(obs => { obs.y += speed * 1.2; });
  obstacles = obstacles.filter(obs => obs.y < 800);

  // Move coins
  coinItems.forEach(c => { c.y += speed * 1.2; });
  coinItems = coinItems.filter(c => c.y < 700);

  // Move powerups
  powerups.forEach(pu => { pu.y += speed * 1.2; });
  powerups = powerups.filter(pu => pu.y < 700);

  // Collision with obstacles
  if (!invincible) {
    obstacles.forEach(obs => {
      if (obs.hit) return;
      if (obs.lane === player.lane) {
        const { sx, sy, scale } = getScreenPos(obs);
        const dist = Math.abs(sy - player.y);
        if (dist < 55 && (obs.type !== 'low' || !player.sliding) && (obs.type !== 'barrier' || !player.jumping || player.jumpY > player.y - 30)) {
          const canAvoid = (obs.type === 'low' && player.sliding) || (player.jumping && player.jumpY < player.y - 20);
          if (!canAvoid) {
            obs.hit = true;
            if (player.shieldActive) {
              player.shieldActive = false;
              burst(player.x, player.y, '#00ccff', 20);
              addScorePopup(player.x, player.y - 40, 'SHIELD!', '#00ccff');
            } else {
              lives--;
              updateHearts();
              invincible = true;
              invincibleTimer = 120;
              burst(player.x, player.y, '#ff4444', 20);
              addScorePopup(player.x, player.y - 40, 'OUCH!', '#ff4444');
              if (lives <= 0) { gameOver(); return; }
            }
          }
        }
      }
    });
  }

  // Coin collection
  coinItems.forEach(c => {
    if (c.collected) return;
    const { sx, sy } = getScreenPos(c);
    if (c.lane === player.lane && Math.abs(sy - (player.jumping ? player.jumpY : player.y)) < 40) {
      c.collected = true;
      coins++;
      score += 10;
      document.getElementById('coinDisplay').textContent = coins;
      burst(sx, sy, '#ffd700', 8);
      addScorePopup(sx, sy - 20, '+10', '#ffd700');
    }
  });

  // Powerup collection
  powerups.forEach(pu => {
    if (pu.collected) return;
    const { sx, sy } = getScreenPos(pu);
    if (pu.lane === player.lane && Math.abs(sy - player.y) < 50) {
      pu.collected = true;
      player.shieldActive = true;
      player.shieldTimer = 300;
      burst(sx, sy, '#00ccff', 16);
      addScorePopup(sx, sy - 30, '🛡️ SHIELD!', '#00ccff');
    }
  });

  updateParticles();
}

// --- UPDATE HEARTS ---
function updateHearts() {
  ['h1','h2','h3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.toggle('lost', i >= lives);
  });
}

// --- GAME OVER ---
function gameOver() {
  gameState = 'gameover';
  if (score > bestScore) bestScore = Math.floor(score);
  cancelAnimationFrame(animFrame);

  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <div class="temple-icon">💀</div>
    <div class="game-over-text">GAME OVER</div>
    <div class="final-score">${Math.floor(score)}</div>
    <div class="final-best">BEST: ${bestScore} ${Math.floor(score) >= bestScore ? '🏆 NEW RECORD!' : ''}</div>
    <button class="btn" onclick="startGame()">🔄 TRY AGAIN</button>
    <div style="margin-top:20px;color:rgba(255,200,100,0.5);font-size:11px;letter-spacing:2px;">COINS COLLECTED: ${coins} 🪙</div>
  `;
  overlay.classList.remove('hidden');
}

// --- GAME LOOP ---
function gameLoop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawTrack();

  // Draw objects back to front
  [...coinItems].sort((a,b) => a.y - b.y).forEach(drawCoin);
  [...powerups].sort((a,b) => a.y - b.y).forEach(drawPowerup);
  [...obstacles].sort((a,b) => a.y - b.y).forEach(drawObstacle);

  drawPlayer();
  drawParticles();
  drawScorePopups();

  update();

  animFrame = requestAnimationFrame(gameLoop);
}

// --- START GAME ---
function startGame() {
  gameState = 'playing';
  score = 0; coins = 0; lives = 3;
  speed = 4; frame = 0;
  obstacles = []; coinItems = []; particles = []; powerups = [];
  scorePopups = [];
  obstacleTimer = 0; coinTimer = 0; powerupTimer = 0;
  invincible = false; invincibleTimer = 0;

  player.lane = 1;
  player.x = LANES[1];
  player.targetX = LANES[1];
  player.jumping = false;
  player.sliding = false;
  player.jumpV = 0;
  player.jumpY = player.y;
  player.shieldActive = false;
  player.shieldTimer = 0;

  updateHearts();
  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('coinDisplay').textContent = '0';
  document.getElementById('bestScoreDisplay').textContent = `BEST: ${bestScore}`;

  document.getElementById('overlay').classList.add('hidden');

  cancelAnimationFrame(animFrame);
  gameLoop();
}

// --- INIT ---
initBgParticles();

// Draw initial menu background
function menuLoop() {
  if (gameState !== 'menu') return;
  ctx.clearRect(0, 0, W, H);
  frame++;
  drawBackground();
  drawTrack();
  requestAnimationFrame(menuLoop);
}
menuLoop();
</script>
